<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect QA Validator</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // Redirects 404 requests back to the app root
      const pathSegmentsToKeep = 1; // keep '/htaccess-checker'
      const loc = window.location;
      const basePath = loc.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      const port = loc.port ? `:${loc.port}` : '';
      loc.replace(`${loc.protocol}//${loc.hostname}${port}${basePath}/`);
    </script>
  </head>
  <body></body>
</html>

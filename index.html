<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect QA Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;color:#374151">
        <p>JavaScript is required to run this application.</p>
      </div>
    </noscript>

    <div class="min-h-screen bg-gray-50 text-gray-900">
      <!-- Header -->
      <header class="bg-white border-b border-gray-200 px-6 py-4">
        <h1 class="text-xl font-bold text-gray-900">🔀 Redirect QA Validator</h1>
        <p class="text-sm text-gray-500 mt-0.5">Validate .htaccess redirects against your sitemap with AI assistance</p>
      </header>

      <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">
        <!-- Inputs Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

          <!-- 1. Gemini Proxy URL -->
          <div class="bg-white rounded-xl border border-gray-200 p-4 space-y-2">
            <label class="block text-sm font-semibold text-gray-700">Gemini Proxy URL</label>
            <input id="proxy-url" type="url" placeholder="https://your-worker.workers.dev"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <p class="text-xs text-gray-400">
              URL of your Cloudflare Worker proxy.
              <a href="https://github.com/agskanchana/htaccess-checker#gemini-proxy-setup" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline">Setup instructions</a>
            </p>
          </div>

          <!-- 2. .htaccess File -->
          <div class="bg-white rounded-xl border border-gray-200 p-4 space-y-2">
            <label class="block text-sm font-semibold text-gray-700">.htaccess File</label>
            <div id="drop-zone"
              class="border-2 border-dashed border-gray-300 rounded-lg p-3 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors">
              <div id="drop-label">
                <p class="text-sm text-gray-500">Drag &amp; drop .htaccess here</p>
                <p class="text-xs text-gray-400 mt-0.5">or click to browse</p>
              </div>
            </div>
            <input id="htaccess-file-input" type="file" accept=".htaccess,text/*" class="hidden" />
            <p class="text-xs text-gray-400">Or paste content below:</p>
            <textarea id="htaccess-textarea" placeholder="Redirect 301 /old-path /new-path&#10;Redirect 410 /deleted-page" rows="4"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
          </div>

          <!-- 3. Sitemap URL -->
          <div class="bg-white rounded-xl border border-gray-200 p-4 space-y-2">
            <label class="block text-sm font-semibold text-gray-700">Sitemap Index URL</label>
            <div class="flex gap-2">
              <input id="sitemap-url" type="url" placeholder="https://example.com/sitemap_index.xml"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              <button id="fetch-btn" disabled
                class="px-3 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Fetch</button>
            </div>
            <div id="sitemap-status"></div>
          </div>
        </div>

        <!-- Global error banners -->
        <div id="errors"></div>

        <!-- Run Button -->
        <div class="flex justify-center">
          <button id="run-btn" disabled
            class="px-8 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm text-sm">Run Validation</button>
        </div>

        <!-- Results -->
        <div id="results-section" class="space-y-4 hidden">
          <!-- Summary Bar -->
          <div class="bg-white rounded-xl border border-gray-200 p-4">
            <div id="summary-bar" class="flex flex-wrap gap-4 items-center"></div>
          </div>

          <!-- Filters & Controls -->
          <div class="flex flex-wrap gap-2 items-center">
            <div id="filter-bar" class="contents"></div>
            <input id="search-input" type="text" placeholder="Search URL or message…"
              class="flex-1 min-w-[180px] border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button id="export-btn"
              class="px-3 py-1.5 bg-white border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-xs font-semibold transition-colors">Export CSV</button>
          </div>

          <!-- Results Table -->
          <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b border-gray-200">
                  <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-16">Type</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">From</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">To</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-20">Status</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Message + AI Suggestion</th>
                  </tr>
                </thead>
                <tbody id="results-tbody" class="divide-y divide-gray-100"></tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
